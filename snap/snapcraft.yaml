name: notepad3
title: Notepad3 (WINE)
summary: notepad3 is a fast and light-weight text editor.
description: |
 notepad3 is a fast and light-weight Scintilla-based text editor with syntax highlighting. It has a small memory footprint, but is powerful enough to handle most programming jobs.
adopt-info: notepad3

grade: stable
confinement: strict
base: core24
platforms:
  amd64:
compression: lzo
assumes:
  - snapd2.62

plugs:
  shmem:
    interface: shared-memory
    private: true
  wine-runtime-c24:
    interface: content
    target: $SNAP/wine-runtime
    default-provider: wine-platform-runtime-core24
  wine-base-stable:
    interface: content
    target: $SNAP/wine-platform
    default-provider: wine-platform

environment:
  WINEDLLOVERRIDES: "mscoree,mshtml=" # Prevent pop-ups about Wine Mono and Wine Gecko
  RUN_EXE: "$SNAP_USER_DATA/notepad3/notepad3.exe"
  SOMMELIER_KEEP_CWD: "1" # Don't change the working directory so relative paths still work
  NO_AT_BRIDGE: "1" # Fix yad error Failed to connect to socket /tmp/dbus-xxx: No such file or directory
  DISABLE_WAYLAND: "1" # Fix gtk decoration under wayland session

apps:
  notepad3:
    extensions: [gnome]
    command: bin/sommelier run-exe
    plugs:
      - shmem
      - home
      - network
      - cups-control
      - removable-media
    desktop: usr/share/applications/notepad3.desktop
  # The wine command can be used to run applications inside the wine
  # environment that this snap uses.
  #
  # For example, users can configure the wine environment of this snap
  # by running `myapp.wine winecfg`.
  wine:
    extensions: [gnome]
    command: bin/sommelier
    plugs:
      - shmem
      - home
      - network
      - cups-control
      - removable-media
  # The winetricks command can be used to run winetricks inside the wine
  # environment that this snap uses.
  winetricks:
    extensions: [gnome]
    command: bin/sommelier winetricks
    plugs:
      - network

parts:
  notepad3:
    plugin: nil
    source: ./snap/local/src
    override-build: |
      craftctl default
      set -ex
      craftctl set version=$(wget -qO- https://github.com/rizonesoft/Notepad3/releases | grep -m2 -oP 'RELEASE_\K[^"]+' | tail -n1)
      ./dl_np3
    stage:
      - bin
      - usr
      - wine-platform
      - wine-runtime
      - sommelier
    build-packages: [wget, unzip]
  # The sommelier script helps you snap Windows applications using Wine. It
  # initializes and configures Wine and installs the Windows application.
  sommelier:
    plugin: make
    source: https://github.com/mmtrt/sommelier-core.git
    source-branch: "core24"
